.r-row{display:flex;gap:8px;align-items:flex-start;font-size:.8rem;line-height:1.6}
.r-row .rl{font-weight:600;flex-shrink:0;width:52px;text-align:justify;text-align-last:justify}.r-row .rv{flex:1}
.r-affirm{margin-top:8px;padding-top:10px;border-top:1px dashed rgba(201,169,110,.25);text-align:center}

.cc3 .r-top{background:linear-gradient(180deg,#2a4a5a,#4a7a8a 60%,#6a9aaa);color:#eef4f6}.cc3 .r-bot{background:linear-gradient(180deg,#eef4f6,#e4f0f4);color:#2a3a4a}.cc3 .r-divider .dot,.cc3 .r-divider .diamond{background:#4a7a8a}.cc3 .r-divider .line{background:#4a7a8a}.cc3 .r-row .rl{color:#3a6a7a}.cc3 .r-img-wrap{background:rgba(74,122,138,.1)}
.cc4 .r-top{background:linear-gradient(180deg,#5a4a2a,#8a7a4a 60%,#aaa06a);color:#f8f6ee}.cc4 .r-bot{background:linear-gradient(180deg,#f6f4ee,#f2f0e6);color:#3a3020}.cc4 .r-divider .dot,.cc4 .r-divider .diamond{background:#8a7a4a}.cc4 .r-divider .line{background:#8a7a4a}.cc4 .r-row .rl{color:#6a5a3a}.cc4 .r-img-wrap{background:rgba(138,122,74,.1)}
.cc5 .r-top{background:linear-gradient(180deg,#4a3a5a,#7a6888 60%,#9a88a8);color:#f4f0f6}.cc5 .r-bot{background:linear-gradient(180deg,#f4f0f6,#eee8f2);color:#3a2a4a}.cc5 .r-divider .dot,.cc5 .r-divider .diamond{background:#7a6888}.cc5 .r-divider .line{background:#7a6888}.cc5 .r-row .rl{color:#5a4a6a}.cc5 .r-img-wrap{background:rgba(122,104,136,.1)}
.healing-box{width:100%;max-width:460px;padding:24px 22px;margin-top:20px;background:rgba(255,255,255,.5);border-radius:14px;border:1px solid rgba(201,169,110,.12);backdrop-filter:blur(8px);animation:fu .7s ease-out .25s both}

.coll-back{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10}
.ptc{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}

const cats=['全部',...Object.keys(CC)];
